<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roomify | Forgot Password</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0c0c12, #1a1a2e);
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

/* HERO */
.hero {
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
}

/* BACKGROUND SHAPES */
.circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.4;
}

.circle1 {
    width: 300px;
    height: 300px;
    background: #c9a76a;
    top: 10%;
    left: 10%;
}

.circle2 {
    width: 400px;
    height: 400px;
    background: #6a5acd;
    bottom: 10%;
    right: 10%;
}

/* LEFT SIDE */
.info-box {
    padding: 50px;
}

.info-box h1 {
    font-size: 38px;
    font-weight: 600;
}

.info-box p {
    color: #ccc;
    margin-top: 15px;
}

/* GLASS CARD */
.form-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* INPUT */
input {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: white !important;
    padding: 12px;
    border-radius: 10px;
}

input:focus {
    border: 1px solid #c9a76a !important;
    box-shadow: 0 0 8px #c9a76a;
}

/* BUTTON */
.btn-reset {
    background: linear-gradient(45deg, #c9a76a, #e6c27a);
    border: none;
    border-radius: 10px;
    font-weight: 600;
}

.btn-reset:hover {
    transform: scale(1.02);
}

/* FOOTER */
.footer {
    background: #111;
    padding: 20px;
    text-align: center;
}
</style>

    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <a class="navbar-brand fw-bold" href="#">🏨 Roomify</a>
</nav>

<div class="hero">

    <!-- BG SHAPES -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT SIDE -->
            <div class="col-md-6 info-box" data-aos="fade-right">
                <h1>Forgot Your Password? 🔐</h1>
                <p>No worries, it happens! Enter your email and we’ll send you a reset link.</p>

                <p class="mt-4">✨ “Security is not a product, but a process.”</p>
                <p>✨ “Stay safe, stay secure.”</p>
            </div>

            <!-- RIGHT FORM -->
            <div class="col-md-5 offset-md-1" data-aos="fade-left">

                <div class="form-card">

                    <h4 class="mb-4 text-center">Reset Password</h4>

                    <form action="/changePassword" method="post">

                        <div class="mb-3">
                            <label>Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter your Registered email" required>
                        </div>

                        <button class="btn btn-reset w-100 mt-3">
                            Send Reset Link
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/login" style="color:#c9a76a;">Back to Login</a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 Roomify | Secure Your Account</p>
</div>

<!-- JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
    duration: 1000,
    once: true
});
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
