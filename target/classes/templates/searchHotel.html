<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Hotels | Roomify</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

<style>

body {
    font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
.navbar {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}
.navbar-brand {
    color: gold !important;
    font-weight: bold;
}

/* Hero */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1501117716987-c8e1ecb2104c') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 20px;
    color: white;
    width: 80%;
    max-width: 1000px;
}

/* Search Box */
.search-box input,
.search-box select {
    height: 50px;
    border-radius: 10px;
}

/* Button */
.btn-search {
    background: linear-gradient(45deg, gold, orange);
    border: none;
    height: 50px;
    font-weight: bold;
}
.btn-search:hover {
    opacity: 0.9;
}

/* Footer */
.footer {
    background: #111;
    color: #ccc;
    padding: 30px;
    text-align: center;
}

</style>
    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="#">🏨 Roomify</a>

    <div class="ms-auto">
        <a href="/booking/myBooking" class="btn btn-outline-light btn-sm me-2">My Bookings</a>
        <a href="/login" class="btn btn-outline-warning btn-sm">Login</a>
    </div>
</nav>

<!-- 🔥 Hero -->
<div class="hero">

    <div class="overlay" data-aos="zoom-in">

        <h2 class="text-center mb-4">Find Your Perfect Stay ✨</h2>

        <form action="/hotel/search" method="get" class="search-box">

            <div class="row g-3">

                <!-- Location -->
                <div class="col-md-3">
                    <input type="text" name="location" class="form-control" placeholder="📍 Location" required>
                </div>

                <!-- CheckIn -->
                <div class="col-md-2">
                    <input type="date" name="checkIn" class="form-control" required>
                </div>

                <!-- CheckOut -->
                <div class="col-md-2">
                    <input type="date" name="checkOut" class="form-control" required>
                </div>

                <!-- Guests -->
                <div class="col-md-2">
                    <select name="guests" class="form-control">
                        <option value="">Guests</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4+</option>
                    </select>
                </div>

                <!-- Room Type -->
                <div class="col-md-2">
                    <select name="roomType" class="form-control">
                        <option value="">Room Type</option>
                        <option value="SINGLE">Single</option>
                        <option value="DOUBLE">Double</option>
                        <option value="DELUXE">Deluxe</option>
                    </select>
                </div>

                <!-- Button -->
                <div class="col-md-1">
                    <button type="submit" class="btn btn-search w-100">🔍</button>
                </div>

            </div>

        </form>

    </div>

</div>

<!-- 🔥 Footer -->
<div class="footer">
    <p>© 2026 Roomify. All rights reserved.</p>
    <p>Made with ❤️ by Satyam</p>
</div>

<!-- AOS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
AOS.init({ duration: 1000 });
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
