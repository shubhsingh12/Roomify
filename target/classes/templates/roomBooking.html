<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roomify | Book Room</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0c0c12, #1a1a2e);
    color: white;
}

/* HERO FULL */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b') center/cover no-repeat;
    position: relative;
    display: flex;
    align-items: center;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
}

/* MAIN CONTENT */
.content {
    position: relative;
    z-index: 2;
    width: 100%;
}

/* LEFT INFO */
.info-box {
    padding: 50px;
}

.info-box h1 {
    font-size: 40px;
    font-weight: 600;
}

.info-box p {
    color: #ccc;
}

/* GLASS CARD */
.booking-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* INPUT */
input {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: white !important;
    padding: 12px;
    border-radius: 10px;
}

input:focus {
    border: 1px solid #c9a76a !important;
    box-shadow: 0 0 8px #c9a76a;
}

/* BUTTON */
.btn-book {
    background: linear-gradient(45deg, #c9a76a, #e6c27a);
    border: none;
    font-weight: 600;
    border-radius: 10px;
}

.btn-book:hover {
    transform: scale(1.02);
}

/* FOOTER */
.footer {
    background: #111;
    padding: 20px;
    text-align: center;
}
</style>

    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="container content">
        <div class="row align-items-center">

            <!-- LEFT SIDE -->
            <div class="col-md-6 info-box" data-aos="fade-right">
                <h1>Luxury Stay Awaits 🏨</h1>
                <p>Book your room with ease and experience premium comfort with Roomify.</p>
                <p>✔ Instant Booking</p>
                <p>✔ Secure Payments</p>
                <p>✔ Best Price Guarantee</p>
            </div>

            <!-- RIGHT SIDE FORM -->
            <div class="col-md-5 offset-md-1" data-aos="fade-left">

                <div class="booking-card">

                    <h4 class="mb-4 text-center">Book Room</h4>

                    <form action="/booking/create" method="post">

                        <input type="hidden" name="roomId" th:value="${roomId}">

                        <div class="mb-3">
                            <label>Check-In</label>
                            <input type="date" name="checkIn" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Check-Out</label>
                            <input type="date" name="checkOut" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Guests</label>
                            <input type="number" name="guests" class="form-control" min="1" required>
                        </div>

                        <button class="btn btn-book w-100 mt-3">
                            Confirm Booking
                        </button>

                    </form>

                </div>

            </div>

        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Roomify | Premium Booking Experience</p>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
    duration: 1000,
    once: true
});
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
