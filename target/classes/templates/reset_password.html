<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roomify | Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0c0c12, #1a1a2e);
    color: white;
}

/* NAVBAR */
.navbar {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
}

/* BG EFFECT */
.circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
}

.circle1 {
    width: 300px;
    height: 300px;
    background: #c9a76a;
    top: 10%;
    left: 10%;
}

.circle2 {
    width: 400px;
    height: 400px;
    background: #6a5acd;
    bottom: 10%;
    right: 10%;
}

/* LEFT */
.info-box {
    padding: 50px;
}

.info-box h1 {
    font-size: 36px;
}

/* FORM */
.form-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* INPUT */
input {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    color: white !important;
    border-radius: 10px;
}

input:focus {
    border: 1px solid #c9a76a !important;
    box-shadow: 0 0 8px #c9a76a;
}

/* BUTTON */
.btn-reset {
    background: linear-gradient(45deg, #c9a76a, #e6c27a);
    border: none;
    border-radius: 10px;
    font-weight: 600;
}

.btn-reset:hover {
    transform: scale(1.02);
}

/* FOOTER */
.footer {
    background: #111;
    padding: 20px;
    text-align: center;
}
</style>

    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <a class="navbar-brand fw-bold" href="#">🏨 Roomify</a>
</nav>

<div class="hero">

    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT -->
            <div class="col-md-6 info-box" data-aos="fade-right">
                <h1>Reset Your Password 🔐</h1>
                <p>Create a new secure password and protect your account.</p>
                <p class="mt-3">✨ Strong passwords = Strong security</p>
            </div>

            <!-- RIGHT FORM -->
            <div class="col-md-5 offset-md-1" data-aos="fade-left">

                <div class="form-card">

                    <h4 class="mb-4 text-center">Set New Password</h4>
					<!-- MESSAGE -->
					      <div th:if="${msg}" 
					           th:class="${msg.contains('successfully')} ? 'alert alert-success text-center py-2' : 'alert alert-danger text-center py-2'">
					          <span th:text="${msg}"></span>
					      </div>
                    <form action="/updatePassword" method="post" id="resetForm">

                        <input type="hidden" name="token" th:value="${token}">

                        <!-- PASSWORD -->
                        <div class="mb-3">
                            <label>New Password</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <!-- CONFIRM -->
                        <div class="mb-3">
                            <label>Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                            <small id="matchMsg"></small>
                        </div>

                        <button class="btn btn-reset w-100 mt-3">
                            Reset Password
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/login" style="color:#c9a76a;">Back to Login</a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Roomify | Secure Access</p>
</div>

<!-- JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({
    duration: 1000,
    once: true
});
</script>

<!-- 🔥 PASSWORD MATCH JS -->
<script id="live_password_match_final">
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const msg = document.getElementById("matchMsg");

function checkMatch() {
    if (confirmPassword.value === "") {
        msg.innerText = "";
        return;
    }

    if (password.value === confirmPassword.value) {
        msg.innerText = "✔ Password matched";
        msg.style.color = "lightgreen";
    } else {
        msg.innerText = "✖ Password does not match";
        msg.style.color = "red";
    }
}

password.addEventListener("keyup", checkMatch);
confirmPassword.addEventListener("keyup", checkMatch);

// 🚫 Prevent submit
document.getElementById("resetForm").addEventListener("submit", function(e) {
    if (password.value !== confirmPassword.value) {
        e.preventDefault();
        alert("Passwords do not match!");
    }
});
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
