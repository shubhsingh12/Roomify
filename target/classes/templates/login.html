<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roomify Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #0f0f14;
  color: white;
}

/* NAVBAR */
.navbar {
  position: absolute;
  top: 0;
  width: 100%;
  z-index: 1000;
}

.navbar a {
  color: white !important;
}

.btn-gold {
  background: #c9a76a;
  border: none;
  color: black;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('/images/Banner.jpg') center/cover no-repeat;
  position: relative;
}

/* OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.85), rgba(0,0,0,0.4));
  z-index: 1;
}

/* CONTENT */
.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
}

/* LEFT TEXT */
.left-text {
  padding: 80px;
}

.left-text h1 {
  font-size: 48px;
  font-weight: 700;
}

.left-text p {
  color: #ccc;
}

/* LOGIN CARD */
.login-card {
  background: rgba(20,20,25,0.9);
  padding: 40px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.form-control {
  background: transparent;
  border: 1px solid #444;
  color: white;
}

.form-control::placeholder {
  color: #aaa;
}

/* FOOTER */
.footer {
  background: #0b0b10;
  color: #ccc;
}
</style>
    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg px-5">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold text-white fs-4">Roomify</a>

    <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#nav">
      ☰
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="nav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Rooms</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Experience</a></li>
      </ul>
    </div>

    <div>
      <a href="/signup" class="btn btn-gold">Sign Up</a>
    </div>

  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="overlay"></div>

  <div class="container hero-content d-flex align-items-center">
    <div class="row w-100">

      <!-- LEFT -->
      <div class="col-md-6 left-text">
        <h1>Welcome Back to Roomify</h1>
        <p class="mt-3">
          Book luxury stays, explore premium comfort, and experience elegance like never before.
        </p>
      </div>

	  <!-- RIGHT LOGIN -->
	  <div class="col-md-6">
	    <div class="login-card p-4">

	      <h3 class="text-center mb-4 fw-semibold">Login</h3>

	      <!-- MESSAGE -->
	      <div th:if="${msg}" 
	           th:class="${msg.contains('successfully')} ? 'alert alert-success text-center py-2' : 'alert alert-danger text-center py-2'">
	          <span th:text="${msg}"></span>
	      </div>

	      <!-- FORM -->
	      <form action="/login" method="post">

	        <input type="email" name="email" 
	               class="form-control mb-3"
	               placeholder="Email address" required>

	        <input type="password" name="password" 
	               class="form-control mb-2"
	               placeholder="Password" required>

	        <!-- FORGOT PASSWORD (RIGHT ALIGN) -->
	        <div class="text-end mb-3">
	          <a href="/forgot-password" class="text-warning small text-decoration-none">
	            Forgot Password?
	          </a>
	        </div>

	        <button type="submit" class="btn btn-gold w-100 mb-3">
	          Login
	        </button>

	      </form>

	      <!-- SIGNUP -->
	      <p class="text-center mb-0">
	        Don’t have an account?
	        <a href="/signup" class="text-warning text-decoration-none fw-semibold">
	          Sign Up
	        </a>
	      </p>

	    </div>
	  </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer py-4">
  <div class="container text-center">
    <p>© 2026 Roomify. All rights reserved.</p>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
