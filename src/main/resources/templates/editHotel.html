<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Hotel | Roomify</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0f0f14, #1a1a24);
  color: white;
  font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.navbar-brand {
  font-weight: bold;
  color: #c9a76a !important;
}

/* HEADER */
.header-section {
  background: linear-gradient(135deg, #0d6efd, #6610f2);
  padding: 35px;
  border-radius: 15px;
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  border: none;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* INPUT */
input {
  background: #1a1a24 !important;
  border: none !important;
  color: white !important;
}

input::placeholder {
  color: #aaa !important;
}

/* BUTTON */
.btn-success {
  background: linear-gradient(45deg, #198754, #20c997);
  border: none;
}

/* IMAGE */
.img-preview {
  border-radius: 10px;
  transition: 0.3s;
}

.img-preview:hover {
  transform: scale(1.05);
}

/* FOOTER */
.footer {
  background: #0b0b10;
  color: #ccc;
  padding: 12px;
  text-align: center;
  margin-top: 50px;
}
</style>
    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4">
  <span class="navbar-brand">🏨 Roomify Admin</span>
  <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="header-section shadow">
    <h2>✏️ Edit Hotel</h2>
    <p>Update hotel details and improve listing quality</p>
  </div>

  <!-- FORM -->
  <div class="row justify-content-center mt-5">
    <div class="col-md-8">

      <div class="card shadow p-4">

        <form action="/hotel/update" method="post" enctype="multipart/form-data">

          <input type="hidden" name="id" th:value="${hotel.id}" />

          <!-- NAME -->
          <div class="mb-3">
            <label>Hotel Name</label>
            <input type="text" name="name" class="form-control"
                   th:value="${hotel.name}">
          </div>

          <!-- COUNTRY + CITY -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label>Country</label>
              <input type="text" name="country" class="form-control"
                     th:value="${hotel.country}">
            </div>

            <div class="col-md-6 mb-3">
              <label>City</label>
              <input type="text" name="city" class="form-control"
                     th:value="${hotel.city}">
            </div>
          </div>

          <!-- ADDRESS 🔥 NEW -->
          <div class="mb-3">
            <label>Address</label>
            <input type="text" name="address" class="form-control"
                   th:value="${hotel.address}">
          </div>

          <!-- IMAGE -->
          <div class="mb-3 text-center">
            <label>Current Image</label><br>
            <img th:src="${hotel.imageUrl}" id="preview"
                 class="img-thumbnail img-preview mt-2"
                 style="max-width:200px;">
          </div>

          <!-- FILE -->
          <div class="mb-3">
            <label>Change Image</label>
            <input type="file" name="image" class="form-control"
                   onchange="previewImage(event)">
          </div>

          <!-- BUTTON -->
          <div class="d-flex justify-content-between mt-4">
            <a href="/dashboard" class="btn btn-secondary">← Back</a>
            <button type="submit" class="btn btn-success px-4">Update</button>
          </div>

        </form>

      </div>

    </div>
  </div>

  <!-- EXTRA INFO -->
  <div class="alert alert-dark mt-5 shadow-sm text-light">
    <h6>💡 Pro Tips</h6>
    <p class="mb-1">✔ Use HD images for better conversion</p>
    <p class="mb-1">✔ Keep address accurate for search ranking</p>
    <p class="mb-0">✔ Add multiple room types for flexibility</p>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Roomify Admin Panel 🚀
</div>

<!-- JS -->
<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
