<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Roomify</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    font-family: 'Poppins', sans-serif;
    background: url('/images/hotel-bg.jpg') no-repeat center center/cover;
    min-height: 100vh;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
}

/* Navbar */
.navbar {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.navbar-brand {
    color: gold !important;
    font-weight: bold;
}

/* Profile Card */
.profile-card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: fadeIn 0.8s ease;
}

/* Image */
.profile-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 4px solid gold;
    object-fit: cover;
    transition: 0.3s;
}

.profile-img:hover {
    transform: scale(1.05);
}

/* Inputs */
.form-control {
    background: rgba(255,255,255,0.08);
    border: none;
    color: white;
}

.form-control:focus {
    background: rgba(255,255,255,0.15);
    color: white;
}

/* Button */
.btn-gold {
    background: linear-gradient(45deg, #c9a76a, #f9d423);
    border: none;
    font-weight: bold;
}

.btn-gold:hover {
    transform: scale(1.02);
}

/* Footer */
.footer {
    background: rgba(0,0,0,0.8);
    color: #aaa;
    padding: 15px;
    text-align: center;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

</style>

    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<div class="overlay">

<!-- 🔥 Navbar -->

<nav class="navbar px-4 py-2">
    <a class="navbar-brand">🏨 Roomify</a>
    <div class="ms-auto">
        <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<!-- 🔥 Profile Section -->

<div class="container d-flex justify-content-center align-items-center" style="min-height:85vh;">

```
<div class="col-md-5">

    <div class="profile-card text-center">

        <h3 class="text-warning mb-4">👤 My Profile</h3>

        <!-- Profile Image -->
		<img id="preview"
		     th:src="@{${user.profileImage != null ? user.profileImage : 'http://localhost:2001/uploads/user.jpg'}}"
		     class="profile-img mb-3">

        <form th:action="@{/updateProfile}" method="post" enctype="multipart/form-data">

            <!-- Upload -->
            <input type="file" name="image" class="form-control mb-3" onchange="previewImage(event)">

            <!-- Name -->
            <input type="text" name="name" class="form-control mb-3"
                   th:value="${user.name}" placeholder="Your Name">

            <!-- Phone -->
            <input type="text" name="phone" class="form-control mb-3"
                   th:value="${user.phone}" placeholder="Phone Number">

            <!-- Email -->
            <input type="email" name="email" class="form-control mb-3"
                   th:value="${user.email}" >

            <!-- Password -->
            <input type="password" name="password" class="form-control mb-3"
                   placeholder="New Password (optional)">

            <button class="btn btn-gold w-100">Update Profile</button>

        </form>

    </div>

</div>
```

</div>

<!-- 🔥 Footer -->

<div class="footer">
    <p>© 2026 Roomify | Designed with Satyam Singh❤️</p>
</div>

</div>

<!-- JS Preview -->

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
