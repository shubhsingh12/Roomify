<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roomify | Hotel Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    background: #0d0d12;
    color: #fff;
    font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar {
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
}

/* HERO */
.hero {
    height: 350px;
    background-size: cover;
    background-position: center;
    position: relative;
}

.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
}

.hero-content {
    position: relative;
    z-index: 2;
    padding: 40px;
}

/* CARD */
.room-card {
    background: #1a1a24;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.room-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 35px rgba(0,0,0,0.7);
}

.room-card img {
    height: 180px;
    object-fit: cover;
    width: 100%;
}

/* BUTTON */
.btn-custom {
    background: #c9a76a;
    color: black;
    border: none;
}

.btn-custom:hover {
    background: #e6c27a;
}

/* BADGE */
.badge {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
}

/* FOOTER */
.footer {
    background: #141420;
    padding: 30px;
    text-align: center;
    margin-top: 50px;
}
</style>
    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand fw-bold" href="#">🏨 Roomify</a>
</nav>

<!-- HERO -->
<div class="hero" th:style="'background-image:url(' + ${hotel.hotelImage} + ')'">
    <div class="overlay"></div>

    <div class="hero-content" data-aos="fade-up">
        <h1 th:text="${hotel.hotelName}"></h1>
        <p th:text="${hotel.location}"></p>
        <p>
            ⭐ <span th:text="${hotel.avgRating}"></span>
            (<span th:text="${hotel.totalReviews}"></span> reviews)
        </p>
    </div>
</div>

<!-- ROOMS -->
<div class="container mt-5">

    <h3 class="mb-4" data-aos="fade-right">Rooms</h3>

    <div class="row">

        <div class="col-md-4 mb-4" th:each="room : ${hotel.rooms}" data-aos="zoom-in">

            <div class="room-card">

                <img th:src="${room.roomImage}" alt="Room">

                <div class="p-3">

                    <h5 th:text="${room.roomType}"></h5>
                    <p>₹ <span th:text="${room.price}"></span></p>

                    <!-- 🟡 Checkout -->
                    <div th:if="${room.showCheckout}">
                        <span class="badge bg-warning text-dark">Checkout Pending</span>

                        <a th:href="@{'/booking/complete/' + ${room.bookingId}}"
                           class="btn btn-warning btn-sm mt-2 w-100">
                           Checkout
                        </a>
                    </div>

                    <!-- 🔴 Occupied -->
                    <div th:if="${!room.showCheckout and !room.available}">
                        <span class="badge bg-danger">Occupied</span>

                        <button class="btn btn-secondary btn-sm mt-2 w-100" disabled>
                            Not Available
                        </button>
                    </div>

                    <!-- 🟢 Available -->
                    <div th:if="${room.available}">
                        <span class="badge bg-success mb-1">Available</span>

						<a th:if="${room.available}" 
						   th:href="@{'/room/book/' + ${room.roomId}}" 
						   class="btn btn-custom w-100 mt-2">
						    Book Now
						</a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 Roomify | All Rights Reserved To Satyam Singh</p>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({
    duration: 900,
    once: true
});
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
