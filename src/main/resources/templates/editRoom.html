<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Room | Roomify</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0f0f14, #1a1a24);
  color: white;
  font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

/* HEADER */
.header-section {
  background: linear-gradient(135deg, #198754, #20c997);
  padding: 30px;
  border-radius: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  backdrop-filter: blur(10px);
  border: none;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* INPUT */
input, select {
  background: #1a1a24 !important;
  border: none !important;
  color: white !important;
}

input::placeholder {
  color: #aaa !important;
}

/* BUTTON */
.btn-success {
  background: linear-gradient(45deg, #198754, #20c997);
  border: none;
}

/* IMAGE */
.img-preview {
  border-radius: 10px;
  transition: 0.3s;
}

.img-preview:hover {
  transform: scale(1.05);
}

/* FOOTER */
.footer {
  background: #0b0b10;
  color: #ccc;
  padding: 12px;
  text-align: center;
  margin-top: 50px;
}
</style>
    <link href="/css/roomify-pro.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4">
  <span class="navbar-brand text-warning">🏨 Roomify Admin</span>
  <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="header-section text-center shadow">
    <h2>✏️ Edit Room</h2>
    <p class="mb-0">Update room details with ease</p>
  </div>

  <!-- FORM -->
  <div class="row justify-content-center mt-5">
    <div class="col-md-7">

      <div class="card shadow p-4">

        <form action="/room/update" method="post" enctype="multipart/form-data">

          <input type="hidden" name="id" th:value="${room.id}" />

          <!-- TYPE -->
          <div class="mb-3">
            <label>Room Type</label>
            <select name="type" class="form-control">
              <option value="SINGLE" th:selected="${room.type == 'SINGLE'}">Single</option>
              <option value="DOUBLE" th:selected="${room.type == 'DOUBLE'}">Double</option>
              <option value="DELUXE" th:selected="${room.type == 'DELUXE'}">Deluxe</option>
            </select>
          </div>

          <!-- PRICE -->
          <div class="mb-3">
            <label>Price (₹)</label>
            <input type="number" name="price" class="form-control"
                   th:value="${room.price}">
          </div>

          <!-- CAPACITY -->
          <div class="mb-3">
            <label>Capacity</label>
            <input type="number" name="capacity" class="form-control"
                   th:value="${room.capacity}">
          </div>

          <!-- HOTEL -->
          <div class="mb-3">
            <label>Select Hotel</label>
            <select name="hotelId" class="form-control">
              <option th:each="hotel : ${hotels}"
                      th:value="${hotel.id}"
                      th:text="${hotel.name}"
                      th:selected="${hotel.id == room.hotelId}">
              </option>
            </select>
          </div>

          <!-- IMAGE -->
          <div class="mb-3 text-center">
            <label>Current Image</label>
            <img th:src="${room.imageUrl}" id="preview"
                 class="img-thumbnail img-preview mt-2"
                 style="max-width:200px;">
          </div>

          <!-- NEW IMAGE -->
          <div class="mb-3">
            <label>Change Image</label>
            <input type="file" name="image" class="form-control"
                   onchange="previewImage(event)">
          </div>

          <!-- BUTTON -->
          <div class="d-flex justify-content-between mt-4">
            <a href="/dashboard" class="btn btn-secondary">← Back</a>
            <button type="submit" class="btn btn-success px-4">Update</button>
          </div>

        </form>

      </div>

    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © Roomify Admin Panel
</div>

<!-- 🔥 JS for live preview -->
<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

    <script src="/js/roomify-ui.js"></script>
</body>
</html>
